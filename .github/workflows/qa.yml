name: QA

# Runs the central QA repo's Playwright journey tests against the deployed
# dashboard on every PR. Blocks merge if the journey tests fail.
#
# Why journey tests specifically: page-load smoke tests passed for both
# Clerk cutover failures this week. Journey tests drive sign-in + assert
# /v1/me/state returns the right tenant, which catches the bug class that
# was actually breaking us.
#
# Cross-account note: this repo lives under PeterChen12 (personal) while
# the qa repo lives under creatorainco. As of 2026-05-28 creatorainco/qa
# is PUBLIC, so anonymous checkout works — no PAT needed. If qa is ever
# made private again, restore the `token: ${{ secrets.QA_REPO_PAT }}`
# line on the checkout step and set the PAT secret per
# Claude_Code_Context/qa-secrets-checklist.md.
#
# Required GH secrets (set via `gh secret set <NAME>`):
#   FF_STUDIO_QA_EMAIL      — e2e-qa@creatorain.com
#   FF_STUDIO_QA_PASSWORD   — that user's Clerk LIVE password
#   FF_STUDIO_QA_API_KEY    — ff_live_* key for the QA tenant

on:
  pull_request:
    branches: [master]
  # For push to master, run AFTER Deploy completes so we test the actually-
  # deployed build, not the previous one. Push + Deploy used to fire in
  # parallel, which produced false failures from QA hitting stale pages.dev.
  workflow_run:
    workflows: [Deploy]
    types: [completed]
    branches: [master]
  workflow_dispatch:

jobs:
  qa-journey:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # When fired by Deploy completing, only run if it succeeded — otherwise
    # we're testing a half-deployed build.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout FF Brand Studio (for context)
        uses: actions/checkout@v4
        with:
          path: ff-brand-studio

      - name: Checkout creatorainco/qa
        uses: actions/checkout@v4
        with:
          repository: creatorainco/qa
          ref: main
          path: qa

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: qa/package-lock.json

      - name: Install QA deps
        working-directory: qa
        run: npm ci

      - name: Install Playwright (chromium only)
        working-directory: qa
        run: npx playwright install --with-deps chromium

      # Runner suite (run-qa-v2) — the central QA framework's static + deployed
      # checks. Previously FF ONLY ran the Playwright journey project, so the
      # 25+ runners never touched it; that's why the X-Org-Id CORS "Failed to
      # fetch" and the silent-cap "NO ASSETS YET" classes shipped to a client
      # despite green CI. These checks close that gap:
      #   - deploy-health  → asserts the worker's Access-Control-Allow-Headers
      #                      covers X-Org-Id/Idempotency-Key (the CORS class)
      #   - unpaginated-list → flags hardcoded list caps with no pagination
      #                        (the silent-cap class)
      #   - cors / code-smell / secrets → static + deployed hygiene
      # FF_DASHBOARD_DIR points sites.config at the source checked out above so
      # the source-scanning runners see the real tree. Default exit semantics
      # (error/critical fail the PR; warnings report) — so a CORS regression
      # BLOCKS merge while heuristic warnings just surface.
      - name: Run QA runner suite against FF (deploy-health + silent-cap + hygiene)
        working-directory: qa
        env:
          QA_ENV: staging
          CI: "true"
          FF_DASHBOARD_DIR: ${{ github.workspace }}/ff-brand-studio/apps/dashboard
        run: >
          npx tsx scripts/run-qa-v2.ts --site ff-brand-studio
          --check deploy-health --check unpaginated-list --check cors
          --check code-smell --check secrets
          --env staging --gh-summary

      - name: Run FF Brand Studio journey tests against staging
        working-directory: qa
        env:
          QA_ENV: staging
          CI: "true"
          FF_STUDIO_QA_EMAIL: ${{ secrets.FF_STUDIO_QA_EMAIL }}
          FF_STUDIO_QA_PASSWORD: ${{ secrets.FF_STUDIO_QA_PASSWORD }}
          FF_STUDIO_QA_API_KEY: ${{ secrets.FF_STUDIO_QA_API_KEY }}
        run: npx playwright test --project=ff-brand-studio-journey

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ff-brand-studio
          path: |
            qa/reports/playwright
            qa/test-results
          retention-days: 14
