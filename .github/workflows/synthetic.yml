name: synthetic

# Phase M3 — runs every 30 minutes. Hits the live URLs that have to
# stay green (sign-in page, /docs, /v1/openapi.yaml, /health) and
# fails if any return non-2xx. Failure → GitHub Actions notification
# → email; if SENTRY_DSN is wired we also POST a Sentry event.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  synthetic:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      # Install pnpm BEFORE setup-node@v5 so setup-node's autodetect of
      # pnpm-lock.yaml at repo root doesn't crash with "Unable to locate
      # executable file: pnpm". `cache: ''` alone wasn't enough — v5 still
      # tries to resolve the package manager during input validation.
      # No `version:` — pnpm/action-setup@v5 errors if both `version` and
      # `packageManager` are set, so let it read from package.json.
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      # Install playwright LOCALLY (not -g) so the inline require() in the
      # synthetic-checks step resolves it. Globally-installed modules aren't
      # on the default require resolution path under Node 22.
      - name: Install playwright (local to runner-temp)
        working-directory: ${{ runner.temp }}
        run: |
          npm init -y > /dev/null
          npm i playwright@^1.49
          npx playwright install --with-deps chromium

      - name: synthetic checks
        working-directory: ${{ runner.temp }}
        env:
          # Both dashboard URLs — synthetic must catch a regression on either
          # one, not just the BFR vanity domain. The 2026-05-27 CORS bug went
          # undetected here because we only probed image-generation.bfr.com.
          DASHBOARD_URLS: ${{ vars.DASHBOARD_URLS || 'https://image-generation.buyfishingrod.com,https://ff-brand-studio.pages.dev' }}
          # Probe the CUSTOM DOMAIN the dashboard actually calls, not the raw
          # *.workers.dev host. workers.dev is blocked from mainland China (our
          # user base) so users hit mcp.image-generation.buyfishingrod.com; a
          # cert-expiry or custom-domain unbind there is the exact outage that
          # showed "API · error" + stuck KPIs for "only some users" — monitor
          # the host that can actually break for them.
          WORKER_URL: ${{ vars.WORKER_URL || 'https://mcp.image-generation.buyfishingrod.com' }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -e
          node - <<'EOF'
          const { chromium } = require("playwright");
          const crypto = require("crypto");

          (async () => {
            const dashboards = (process.env.DASHBOARD_URLS || "")
              .split(",").map(s => s.trim()).filter(Boolean);
            const worker = process.env.WORKER_URL;
            const checks = [
              { url: `${worker}/health`, expect: 200 },
              { url: `${worker}/docs`, expect: 200 },
              { url: `${worker}/v1/openapi.yaml`, expect: 200 },
              ...dashboards.map(d => ({ url: `${d}/sign-in`, expect: 200 })),
              // CORS preflight from each dashboard origin against the worker.
              // The 204+missing-ACA-Origin failure mode we just fixed would
              // be caught here as a "preflight rejected" line.
              ...dashboards.map(d => ({
                url: `${worker}/health`,
                expect: 200,
                preflightFrom: d,
              })),
            ];

            const browser = await chromium.launch();
            const ctx = await browser.newContext();
            const page = await ctx.newPage();
            const failures = [];
            for (const c of checks) {
              if (c.preflightFrom) {
                // CORS preflight check: simulate a browser sending OPTIONS
                // with Origin: <dashboard>. Fail if ACA-Origin is missing.
                const res = await fetch(c.url, {
                  method: "OPTIONS",
                  headers: {
                    Origin: c.preflightFrom,
                    "Access-Control-Request-Method": "POST",
                    "Access-Control-Request-Headers": "content-type,authorization",
                  },
                });
                const aca = res.headers.get("access-control-allow-origin");
                if (!aca || (aca !== c.preflightFrom && aca !== "*")) {
                  failures.push(`CORS preflight ${c.url} from ${c.preflightFrom} → missing/wrong ACA-Origin (got: ${aca || "<none>"})`);
                } else {
                  console.log(`OK  preflight ${c.url} from ${c.preflightFrom}`);
                }
                continue;
              }
              const res = await page.goto(c.url, { waitUntil: "domcontentloaded", timeout: 20000 });
              const status = res?.status() ?? 0;
              if (status !== c.expect) {
                failures.push(`${c.url} → ${status} (expected ${c.expect})`);
              } else {
                console.log(`OK  ${c.url}`);
              }
            }
            await browser.close();

            if (failures.length > 0) {
              console.error("synthetic FAILED:");
              for (const f of failures) console.error("  - " + f);
              const dsn = process.env.SENTRY_DSN;
              if (dsn) {
                try {
                  const u = new URL(dsn);
                  const eventId = crypto.randomBytes(16).toString("hex");
                  const ts = new Date().toISOString();
                  const env = JSON.stringify({ event_id: eventId, sent_at: ts, dsn });
                  const item = JSON.stringify({ type: "event" });
                  const event = JSON.stringify({
                    event_id: eventId,
                    timestamp: ts,
                    level: "error",
                    platform: "node",
                    server_name: "ff-synthetic",
                    message: { formatted: "synthetic check failed: " + failures.join("; ") },
                    tags: { check: "synthetic" },
                  });
                  await fetch(`${u.protocol}//${u.host}/api/${u.pathname.replace(/^\//,"")}/envelope/`, {
                    method: "POST",
                    headers: {
                      "content-type": "application/x-sentry-envelope",
                      "x-sentry-auth": `Sentry sentry_version=7,sentry_key=${u.username},sentry_client=ff-synthetic/0.1`,
                    },
                    body: env + "\n" + item + "\n" + event + "\n",
                  });
                } catch (err) {
                  console.error("[sentry notify failed]", err);
                }
              }
              process.exit(1);
            }
            console.log("all checks green");
          })().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          EOF
