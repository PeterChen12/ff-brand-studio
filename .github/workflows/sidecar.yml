name: image-sidecar

# Phase I — builds apps/image-sidecar Docker image and pushes to ECR.
# App Runner is configured to auto-deploy on every successful push.
#
# Triggers:
#  - push to master that touches apps/image-sidecar/**
#  - manual dispatch (so you can rebuild on demand without a code change)

on:
  push:
    branches: [master]
    paths:
      - "apps/image-sidecar/**"
      - ".github/workflows/sidecar.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ff-brand-studio/image-sidecar
  AWS_ACCOUNT_ID: "590183723867"

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/image-sidecar
          file: ./apps/image-sidecar/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
