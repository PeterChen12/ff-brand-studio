name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  type-check-and-unit-tests:
    name: Type-check + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        # No `version:` — action reads from package.json#packageManager (pnpm@10.33.2),
        # the Node 20+ canonical source of truth. Specifying both errors out
        # with ERR_PNPM_BAD_PM_VERSION (see commit history 2026-04-25 → -26 for proof).

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # @ff/types resolves via dist/index.js (see packages/types/package.json#main).
      # The dashboard + worker import from it at runtime/test time, so the package
      # must be built BEFORE type-check or vitest run; otherwise the tests fail
      # with `Cannot find module './api.js'` (see CI run 25904309709 for proof).
      - name: Build @ff/types
        run: pnpm --filter @ff/types build

      - name: Type-check
        run: pnpm type-check

      - name: Unit tests
        run: pnpm --filter ff-mcp-server test

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Integration tests need a live Postgres + secrets. Only run on master push,
    # not on PRs from forks (which can't access the secret).
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: type-check-and-unit-tests
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        # No `version:` — action reads from package.json#packageManager (pnpm@10.33.2),
        # the Node 20+ canonical source of truth. Specifying both errors out
        # with ERR_PNPM_BAD_PM_VERSION (see commit history 2026-04-25 → -26 for proof).

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The integration test imports the FULL launch pipeline, which pulls in
      # @ff/brand-rules and @ff/media-clients in addition to @ff/types. All
      # three resolve via dist/index.js (gitignored), so vitest can't import
      # them until they're built. (@ff/seo-clients resolves via src — no build
      # needed.) Building only @ff/types here is why the suite failed to
      # collect with "Failed to resolve entry for package @ff/brand-rules"
      # once PGPASSWORD was set and the suite started actually running.
      - name: Build workspace libs
        run: pnpm --filter @ff/types --filter @ff/brand-rules --filter @ff/media-clients build

      - name: Integration tests
        env:
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGHOST: ${{ secrets.PGHOST }}
          PGPORT: ${{ secrets.PGPORT }}
          PGUSER: ${{ secrets.PGUSER }}
          PGDATABASE: ${{ secrets.PGDATABASE }}
        run: |
          if [ -z "$PGPASSWORD" ]; then
            echo "PGPASSWORD secret not set — skipping integration tests."
            exit 0
          fi
          pnpm --filter ff-mcp-server test:integration
