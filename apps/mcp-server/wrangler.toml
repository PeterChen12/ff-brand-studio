name = "ff-brand-studio-mcp"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# NOTE: this Worker is on the Cloudflare FREE plan, which rejects a
# [limits] cpu_ms override (error 100328). The pipeline is dominated by
# external-API I/O (gpt-image-2, fal, sidecar) — fetch wait does NOT count
# against CPU time — so the default CPU budget is fine; the failure mode was
# waitUntil cancellation, not CPU. If this Worker is moved to a paid plan,
# add `[limits]\ncpu_ms = 300000` for extra headroom on the image-decode steps.

# Durable launch execution. POST /v1/launches (async) enqueues here instead of
# running the pipeline in executionCtx.waitUntil() — Cloudflare cancels
# waitUntil work shortly after the HTTP response returns, which silently
# killed every multi-minute generation mid-flight ("waitUntil() tasks did not
# complete within the allowed time after invocation end and have been
# cancelled") and left runs stuck 'running' until the zombie-sweeper cron
# failed them. The consumer runs each launch in its own invocation.
[[queues.producers]]
queue = "ff-launch-queue"
binding = "LAUNCH_QUEUE"

[[queues.consumers]]
queue = "ff-launch-queue"
# One launch per invocation — never batch two multi-minute pipelines into a
# single consumer invocation (that WOULD blow the time budget).
max_batch_size = 1
max_batch_timeout = 0
# A launch is expensive (real FAL/OpenAI spend); don't retry-storm. One retry
# covers a transient blip; beyond that the run is marked failed and refunded.
max_retries = 1
# Process a few concurrent launches without unbounded fan-out.
max_concurrency = 3

# Custom domain — the API MUST be served from a buyfishingrod.com host, not
# the default *.workers.dev. workers.dev is blocked/throttled by the GFW and
# some corporate networks, so China-based sellers (our primary user base)
# could load the dashboard (image-generation.buyfishingrod.com, a proxied
# Pages custom domain on Cloudflare's main edge) but EVERY API call + the
# /health probe silently failed — surfacing as "API · error" + permanently
# stuck KPI skeletons for "only some users". This binds the same worker to a
# reachable custom domain. (cert: advanced pack covering this exact host.)
[[routes]]
pattern = "mcp.image-generation.buyfishingrod.com"
custom_domain = true

# sharp is a native libvips binding — it can't run inside Workers, but its
# transitive imports (`detect-libc.familySync` -> `process.report.getReport`)
# crash deploy bundle validation (error 10021). Alias the bare `sharp`
# specifier to a throwing stub so the bundle compiles; tests + the sidecar
# still resolve the real package because the alias only applies to the
# worker bundle. Code that actually needs sharp at runtime must route
# through the image-sidecar (pipeline/sidecar.ts).
[alias]
"sharp" = "./src/shims/sharp-worker-stub.ts"

[[r2_buckets]]
binding = "R2"
bucket_name = "ff-brand-studio-assets"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "63a0417c93894f988b1293f6909a7e61"

# Phase I — Workers AI binding for CLIP triage (free tier)
[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
R2_PUBLIC_URL = "https://pub-db3f39e3386347d58359ba96517eec84.r2.dev"

# Phase A2/A3 — scheduled handler. Every 5 min:
#   - sweep zombie launch_runs (status=running > 10 min) and refund
#   - retry due webhook_deliveries (next_attempt_at <= now)
#   - purge stale idempotency_keys (created_at older than 24h)
[triggers]
crons = ["*/5 * * * *"]

# Secrets — set with: wrangler secret put ANTHROPIC_API_KEY
# ANTHROPIC_API_KEY, OPENAI_API_KEY, FAL_KEY
# PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
# LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_BASE_URL
