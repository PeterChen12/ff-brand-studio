version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install --frozen-lockfile
    build:
      commands:
        - cd apps/dashboard && pnpm run build
  artifacts:
    baseDirectory: apps/dashboard/.next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - apps/dashboard/.next/cache/**/*
